<!DOCTYPE html>
<html>
<head>
    <title>MNIST Predictor</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        canvas { border: 2px solid black; cursor: crosshair; background: white; }
    </style>
</head>
<body>
    <h1>Draw a Digit (0-9)</h1>
    <canvas id="canvas" width="280" height="280"></canvas><br>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="predict()">Predict</button>
    <h2 id="result"></h2>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 20;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';
        let drawing = false;

        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => drawing = false;
        canvas.onmousemove = (e) => {
            if (!drawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        };

        function clearCanvas() { ctx.clearRect(0, 0, 280, 280); ctx.beginPath(); document.getElementById('result').innerText = ''; }

        async function predict() {
            // Resize canvas to 28x28 for the model
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28; tempCanvas.height = 28;
            tempCanvas.getContext('2d').drawImage(canvas, 0, 0, 28, 28);
            
            const imgData = tempCanvas.getContext('2d').getImageData(0, 0, 28, 28);
            const grayscale = [];
            for (let i = 0; i < imgData.data.length; i += 4) {
                // Get alpha channel or average to simulate grayscale
                grayscale.push(imgData.data[i + 3] / 255); 
            }

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: grayscale})
            });
            const result = await response.json();
            document.getElementById('result').innerText = 'Prediction: ' + result.prediction;
        }
    </script>
</body>
</html>
